# ╭─────────────────────────Commonly Used ImplementationGuide Properties───────────────────────────╮
# │  The properties below are used to create the ImplementationGuide resource. The most commonly   │
# │  used properties are included. For a list of all supported properties and their functions,     │
# │  see: https://fshschool.org/docs/sushi/configuration/.                                         │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯
id: csiro.fhir.au.gpccmp
canonical: https://gpccmp.csiro.au/ig
name: GPChronicConditionManagementPlan
title: GP Chronic Condition Management Plan
description: The GP Chronic Condition Management Plan FHIR Implementation Guide describes the conformance expectations of systems launching and exchanging health information to support the chronic condition management plan form in general practice.
status: draft # draft | active | retired | unknown
version: 0.1.0
fhirVersion: 4.0.1 # https://www.hl7.org/fhir/valueset-FHIR-version.html
copyrightYear: 2025+
releaseLabel: CI Build
# license: CC0-1.0 # https://www.hl7.org/fhir/valueset-spdx-license.html
# jurisdiction: urn:iso:std:iso:3166#US "United States of America" # https://www.hl7.org/fhir/valueset-jurisdiction.html
publisher:
  name: AEHRC CSIRO
  url: http://example.org/example-publisher
  # email: test@example.org

# The dependencies property corresponds to IG.dependsOn. The key is the
# package id and the value is the version (or dev/current). For advanced
# use cases, the value can be an object with keys for id, uri, and version.
#
dependencies:
  hl7.fhir.au.core: 2.0.0
  hl7.fhir.au.base: 6.0.0
  hl7.fhir.uv.sdc: 4.0.0
  hl7.fhir.uv.smart-app-launch: 2.2.0
  hl7.fhir.uv.extensions.r4: 5.2.0
#
#
# The pages property corresponds to IG.definition.page. SUSHI can
# auto-generate the page list, but if the author includes pages in
# this file, it is assumed that the author will fully manage the
# pages section and SUSHI will not generate any page entries.
# The page file name is used as the key. If title is not provided,
# then the title will be generated from the file name.  If a
# generation value is not provided, it will be inferred from the
# file name extension.  Any subproperties that are valid filenames
# with supported extensions (e.g., .md/.xml) will be treated as
# sub-pages.
#
# pages:
#   index.md:
#     title: Example Home
#   implementation.xml:
#   examples.xml:
#     title: Examples Overview
#     simpleExamples.xml:
#     complexExamples.xml:
#
#
# The parameters property represents IG.definition.parameter. Rather
# than a list of code/value pairs (as in the ImplementationGuide
# resource), the code is the YAML key. If a parameter allows repeating
# values, the value in the YAML should be a sequence/array.
# For parameters defined by core FHIR see:
# http://build.fhir.org/codesystem-guide-parameter-code.html
# For parameters defined by the FHIR Tools IG see:
# http://build.fhir.org/ig/FHIR/fhir-tools-ig/branches/master/CodeSystem-ig-parameters.html
#
parameters:
  path-expansion-params: '../../input/_resources/exp-params.json'
  special-url-base: 'https://smartforms.csiro.au/ig'
  special-url:
    - 'http://www.health.gov.au/assessments/GPChronicConditionManagementPlan'
    - 'https://smartforms.csiro.au/ig/StructureDefinition/QuestionnaireItemTextHidden'
    - 'https://smartforms.csiro.au/ig/StructureDefinition/GroupHideAddItemButton'
    

  apply-publisher: false
  default-publisher: true
  apply-version: false
  default-version: true
  apply-contact: false
  default-contact: true
  apply-copyright: false
  default-copyright: true 
#
# ╭────────────────────────────────────────────menu.xml────────────────────────────────────────────╮
# │ The menu property will be used to generate the input/menu.xml file. The menu is represented    │
# │ as a simple structure where the YAML key is the menu item name and the value is the URL.       │
# │ The IG publisher currently only supports one level deep on sub-menus. To provide a             │
# │ custom menu.xml file, do not include this property and include a `menu.xml` file in            │
# │ input/includes. To use a provided input/includes/menu.xml file, delete the "menu"              │
# │ property below.                                                                                │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯

menu:
  Home: index.html
  Guidance:
      General Requirements: general-requirements.html
      Implementation Considerations: implementation-considerations.html
  FHIR Artefacts:
      Artefact Summary: artifacts.html
      Questionnaires: questionnaires.html
      Profiles and Extensions: profiles-and-extensions.html
      Capability Statements: capability-statements.html
      Actor Definitions: actor-definitions.html
  Downloads: downloads.html

# ╭───────────────────────────Less Common Implementation Guide Properties──────────────────────────╮
# │  Uncomment the properties below to configure additional properties on the ImplementationGuide  │
# │  resource. These properties are less commonly needed than those above.                         │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯
#
# Those who need more control or want to add additional details to the contact values can use
# contact directly and follow the format outlined in the ImplementationGuide resource and
# ContactDetail.
#
# contact:
#   - name: Bob Smith
#     telecom:
#       - system: email # phone | fax | email | pager | url | sms | other
#         value: bobsmith@example.org
#         use: work
#
#
# The global property corresponds to the IG.global property, but it
# uses the type as the YAML key and the profile as its value. Since
# FHIR does not explicitly disallow more than one profile per type,
# neither do we; the value can be a single profile URL or an array
# of profile URLs. If a value is an id or name, SUSHI will replace
# it with the correct canonical when generating the IG JSON.
#
# global:
#   Patient: http://example.org/fhir/StructureDefinition/my-patient-profile
#   Encounter: http://example.org/fhir/StructureDefinition/my-encounter-profile
#
#
# The resources property corresponds to IG.definition.resource.
# SUSHI can auto-generate all of the resource entries based on
# the FSH definitions and/or information in any user-provided
# JSON or XML resource files. If the generated entries are not
# sufficient or complete, however, the author can add entries
# here. If the reference matches a generated entry, it will
# replace the generated entry. If it doesn't match any generated
# entries, it will be added to the generated entries. The format
# follows IG.definition.resource with the following differences:
#   * use IG.definition.resource.reference.reference as the YAML key.
#   * if the key is an id or name, SUSHI will replace it with the
#     correct URL when generating the IG JSON.
#   * specify "omit" to omit a FSH-generated resource from the
#     resource list.
#   * if the exampleCanonical is an id or name, SUSHI will replace
#     it with the correct canonical when generating the IG JSON.
#   * groupingId can be used, but top-level groups syntax may be a
#     better option (see below).
# The following are simple examples to demonstrate what this might
# look like:
#
# resources:
#   Patient/my-example-patient:
#     name: My Example Patient
#     description: An example Patient
#     exampleBoolean: true
#   Patient/bad-example: omit

resources:
  AllergyIntolerance/latex-foreman-caterina:
    name: AllergyIntolerance - Latex
    description: Example of allergy intolerance for the *GP CCMP AllergyIntolerance* profile. Represents an active allergy using coded data for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Condition/back-pain-foreman-caterina:
    name: Condition - Back Pain
    description: Example of condition for the *GP CCMP Condition* profile. Represents an active back pain condition using coded data for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Condition/gord-foreman-caterina:
    name: Condition - GORD
    description: Example of condition for the *GP CCMP Condition* profile. Represents an active gastroesophageal reflux disease condition using coded data for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Encounter/gpccmp-foreman-caterina:
    name: Encounter - GP Chronic Care Consultation
    description: Example of encounter for the *GP CCMP Encounter* profile. Represents a care plan development consultation encounter for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor as launch context.
    exampleBoolean: true
  Location/quinninup-medical-clinic:
    name: Location - Medical Clinic
    description: Example of location for the *GP CCMP Location* profile. Represents a medical clinic location for Quinninup Medical Clinic. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Medication/panadolosteo-external-foreman-caterina:
    name: Medication - Panadol Osteo External
    description: Example of medication for the *GP CCMP Medication* profile. Represents an external medication resource referenced by the MedicationStatement example, *MedicationStatement - Active Panadol Osteo External*.
    exampleBoolean: true
  MedicationStatement/active-panadolosteo-external-foreman-caterina:
    name: MedicationStatement - Active Panadol Osteo External
    description: Example of medication statement for the *GP CCMP MedicationStatement* profile. Represents an active medication statement for patient, Caterina Foreman with an external medication reference to the Medication example, *Medication - Panadol Osteo External*. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  MedicationStatement/active-panadolosteo-internal-foreman-caterina:
    name: MedicationStatement - Active Panadol Osteo Internal
    description: Example of medication statement for the *GP CCMP MedicationStatement* profile. Represents an active medication statement for patient, Caterina Foreman with an internal contained medication reference. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  MedicationStatement/esomeprazole-foreman-caterina:
    name: MedicationStatement - Esomeprazole
    description: Example of medication statement for the *GP CCMP MedicationStatement* profile. Represents a coded medication statement for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/alcohol-use-foreman-caterina:
    name: Observation - Alcohol Use
    description: Example of observation for the *GP CCMP Alcohol Use Status* profile. Represents an alcohol use observation for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/blood-pressure-foreman-caterina:
    name: Observation - Blood Pressure
    description: Example of observation for the *GP CCMP Blood Pressure* profile. Represents a vital signs blood pressure measure for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/body-height-foreman-caterina:
    name: Observation - Body Height
    description: Example of observation for the *GP CCMP Body Height* profile. Represents a vital signs body height observation for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/body-weight-foreman-caterina:
    name: Observation - Body Weight
    description: Example of observation for the *GP CCMP Body Weight* profile. Represents a vital signs body weight observation for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/heart-rhythm-foreman-caterina:
    name: Observation - Heart Rhythm
    description: Example of observation for the *GP CCMP Heart Rhythm* profile. Represents a vital signs heart rhythm observation for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/oxygen-saturation-foreman-caterina:
    name: Observation - Oxygen Saturation
    description: Example of observation for the *GP CCMP Oxygen Saturation* profile. Represents a vital signs oxygen saturation observation for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/pulse-rate-foreman-caterina:
    name: Observation - Pulse Rate
    description: Example of observation for the *GP CCMP Pulse Rate* profile. Represents a vital signs pulse rate observation for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/smoking-status-foreman-caterina:
    name: Observation - Smoking Status
    description: Example of observation for the *GP CCMP Smoking Status* profile. Represents a smoking status observation for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Observation/waist-circumference-foreman-caterina:
    name: Observation - Waist Circumference
    description: Example of observation for the *GP CCMP Waist Circumference* profile. Represents a vital signs waist circumference observation for patient, Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor for prepopulation.
    exampleBoolean: true
  Patient/foreman-caterina:
    name: Patient - Caterina Foreman
    description: Example of patient for the *GP CCMP Patient* profile. Represents a patient for Caterina Foreman. This could represent a resource provided by a GP CCMP Server actor as launch context.
    exampleBoolean: true
  Practitioner/primary-peter:
    name: Practitioner - Dr. Peter Primary
    description: Example of practitioner for the *GP CCMP Practitioner* profile. Represents a general practitioner for Dr. Peter Primary. This could represent a resource provided by a GP CCMP Server actor as launch context.
    exampleBoolean: true
  PractitionerRole/gp-primary-peter:
    name: PractitionerRole - General Practitioner
    description: Example of practitioner role for the *GP CCMP PractitionerRole* profile. Represents a general practitioner role for Dr. Peter Primary. This could represent a resource provided by a GP CCMP Server actor as launch context.
    exampleBoolean: true
  QuestionnaireResponse/gpccmp-form-foreman-caterina:
    name: QuestionnaireResponse - GP Chronic Care Form
    description: Example of questionnaire response for the *GP CCMP QuestionnaireResponse* profile. Represents an in progress GP chronic care management plan form for patient, Caterina Foreman.
    exampleBoolean: true

